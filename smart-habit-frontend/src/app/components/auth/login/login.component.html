<app-navbar />

<!-- Main Canvas -->
<main
  class="flex-1 flex items-center justify-center px-4 pt-24 pb-12 relative z-10 min-h-screen bg-background dark text-on-background font-body-md selection:bg-primary/30 selection:text-primary">
  <!-- Subtle AI Glow Background Effect -->
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[100px] pointer-events-none z-0">
  </div>

  <!-- Login Card -->
  <div
    class="w-full max-w-[480px] bg-surface-container-low border border-outline-variant rounded-xl p-lg sm:p-10 shadow-2xl relative z-10">
    <!-- Header -->
    <div class="mb-lg text-center">
      <h1 class="font-h2 text-h2 text-on-surface mb-2">Welcome back</h1>
      <p class="font-body-md text-body-md text-on-surface-variant">Log in to continue your flow state.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-md" novalidate>
      <!-- Email Field -->
      <div class="flex flex-col gap-xs group">
        <label
          class="font-label-caps text-label-caps text-on-surface-variant group-focus-within:text-primary transition-colors"
          for="email">Email Address</label>
        <input formControlName="email"
          [class.border-error]="showEmailError"
          class="bg-transparent border border-outline-variant rounded-DEFAULT px-sm py-[10px] font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-outline/50"
          id="email" name="email" placeholder="jane@example.com" type="email" />
        @if (showEmailError) {
          <p class="text-[12px] text-error mt-0.5">{{ emailErrorMsg }}</p>
        }
      </div>

      <!-- Password Field -->
      <div class="flex flex-col gap-xs group">
        <label
          class="font-label-caps text-label-caps text-on-surface-variant group-focus-within:text-primary transition-colors"
          for="password">Password</label>
        <input formControlName="password"
          [class.border-error]="showPasswordError"
          class="bg-transparent border border-outline-variant rounded-DEFAULT px-sm py-[10px] font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-[10px] placeholder:tracking-[0.3em] placeholder:text-outline/50"
          id="password" name="password" placeholder="••••••••" type="password" />
        @if (showPasswordError) {
          <p class="text-[12px] text-error mt-0.5">{{ passwordErrorMsg }}</p>
        }
      </div>

      <!-- General Error Message Banner -->
      @if (globalError()) {
      <div class="mt-xs bg-error-container/20 border border-error/50 rounded-DEFAULT p-sm flex items-start gap-3">
        <span class="material-symbols-outlined text-error mt-[2px]"
          style="font-variation-settings: 'FILL' 1;">warning</span>
        <div class="font-body-md text-body-md text-error leading-snug text-[15px]">
          {{ globalError() }}
        </div>
      </div>
      }

      <!-- Submit Button -->
      <button [disabled]="isButtonDisabled"
        class="mt-xs w-full bg-primary text-on-primary font-body-lg text-body-lg font-bold rounded-DEFAULT py-[12px] px-sm transition-all hover:bg-primary-fixed active:scale-[0.98] shadow-[0_0_20px_rgba(208,188,255,0.15)] hover:shadow-[0_0_25px_rgba(208,188,255,0.25)] flex items-center justify-center gap-2 disabled:opacity-50 disabled:pointer-events-none"
        type="submit">
        @if (isSubmitting()) {
        Processing...
        } @else {
        Log In
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
        }
      </button>
    </form>

    <!-- Footer Link -->
    <div class="mt-lg text-center border-t border-outline-variant/30 pt-sm">
      <p class="font-body-md text-[15px] text-on-surface-variant">
        Don't have an account?
        <a class="text-primary font-semibold hover:text-primary-fixed transition-colors hover:underline underline-offset-4 decoration-primary/50"
          href="/register">Sign Up</a>
      </p>
    </div>
  </div>
</main>
