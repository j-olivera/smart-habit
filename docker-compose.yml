

services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smarthabit}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./smart-backend
      dockerfile: Dockerfile
    container_name: smart-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smarthabit}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-strong_password}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_for_development}
      SPRING_AI_OLLAMA_BASE_URL: http://smart-ollama:11434
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: ${OLLAMA_MODEL:-phi3}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./smart-habit-frontend
      dockerfile: Dockerfile
      network: host
    container_name: smart-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: smart-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:
  ollama-data:


networks:
  default:
    name: smart-internal
    driver: bridge
