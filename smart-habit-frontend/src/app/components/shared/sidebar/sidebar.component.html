<aside class="w-64 h-screen bg-zinc-950/80 backdrop-blur-xl border-r border-zinc-800/50 shadow-2xl flex flex-col fixed left-0 top-0 z-40">
  <!-- Brand -->
  <div class="h-16 flex items-center px-6 border-b border-zinc-800/50">
    <a routerLink="/app/dashboard" class="flex items-center gap-2 group outline-none">
      <span class="text-xl font-extrabold text-zinc-100 tracking-tighter group-hover:text-primary transition-colors duration-200">
        SmartHabit
      </span>
    </a>
  </div>

  <!-- Navigation -->
  <nav class="flex-grow px-4 py-6 flex flex-col gap-2">
    @for (item of navItems; track item.route) {
      <a 
        [routerLink]="item.route" 
        routerLinkActive="bg-primary/10 text-primary border-primary/20" 
        [routerLinkActiveOptions]="{exact: false}"
        class="flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 font-medium hover:text-zinc-100 hover:bg-zinc-800/50 transition-all duration-200 border border-transparent outline-none focus-visible:ring-2 focus-visible:ring-primary/50"
      >
        <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">{{ item.icon }}</span>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Logout Button -->
  <div class="p-4 border-t border-zinc-800/50">
    <button 
      (click)="onLogout()"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-400 font-medium hover:text-red-300 hover:bg-red-500/10 transition-all duration-200 outline-none focus-visible:ring-2 focus-visible:ring-red-500/50 active:scale-95"
    >
      <span class="material-symbols-outlined text-[20px]">logout</span>
      Logout
    </button>
  </div>
</aside>
